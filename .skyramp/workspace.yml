# Skyramp Workspace Configuration
workspace:
  repoName: sxarsky/infisical
  repoUrl: https://github.com/sxarsky/infisical
metadata:
  schemaVersion: v1
  mcpVersion: 0.2.6
  executorVersion: v1.3.27
  createdAt: "2026-06-21T17:09:04.610Z"
  updatedAt: "2026-06-21T17:09:04.616Z"
services:
  - serviceName: infisical-backend
    language: typescript
    framework: playwright
    testDirectory: tests/skyramp/backend
    api:
      authType: bearer
      authHeader: Authorization
      baseUrl: http://localhost:8080
    runtimeDetails:
      serverStartCommand: docker compose -f docker-compose.bdd.yml up -d --build backend
      runtime: docker
      dockerNetwork: infisical_default
  - serviceName: infisical-frontend
    language: typescript
    framework: playwright
    testDirectory: tests/skyramp/frontend
    api:
      authType: none
      authHeader: ""
      baseUrl: http://localhost:8080
    runtimeDetails:
      serverStartCommand: docker compose -f docker-compose.bdd.yml up -d --build frontend
      runtime: docker
      dockerNetwork: infisical_default
