# Skyramp Workspace Configuration
#
# baseUrl is set to the in-network nginx entry point (http://nginx, container port 80)
# rather than the host-published http://localhost:8080. The Skyramp executor (v1.3.27)
# attaches to the compose network `infisical_default`, where `localhost` resolves to the
# executor container itself, not the SUT. nginx proxies `/` -> frontend:3000 and `/api` ->
# backend, so http://nginx is the single reachable entry point from inside the network.
workspace:
  repoName: sxarsky/infisical
  repoUrl: https://github.com/sxarsky/infisical
metadata:
  schemaVersion: v1
  mcpVersion: 0.2.6
  executorVersion: v1.3.27
  createdAt: "2026-06-20T21:27:45.690Z"
  updatedAt: "2026-06-20T21:27:45.697Z"
services:
  - serviceName: infisical-infisical-backend
    language: typescript
    framework: playwright
    testDirectory: tests/skyramp/backend
    api:
      authType: bearer
      authHeader: Authorization
      baseUrl: http://nginx
    runtimeDetails:
      serverStartCommand: docker compose -f docker-compose.bdd.yml up -d backend
      runtime: docker
      dockerNetwork: infisical_default
  - serviceName: infisical-infisical-frontend
    language: typescript
    framework: playwright
    testDirectory: tests/skyramp/frontend
    api:
      authType: none
      authHeader: ""
      baseUrl: http://nginx
    runtimeDetails:
      serverStartCommand: docker compose -f docker-compose.bdd.yml up -d frontend
      runtime: docker
      dockerNetwork: infisical_default
